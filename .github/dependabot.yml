version: 2
updates:
  # GitHub Actions used by the CI and release workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns: ["*"]

  # Go module dependencies (currently none, but keep zotgo current as they land).
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: build
    groups:
      go:
        patterns: ["*"]
